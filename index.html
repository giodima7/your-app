async function scanFood(){
  const key=`w${eatWeek}-${dayKey(eatDay)}`;
  const input=document.getElementById('scan-input');
  if(!input)return;
  const q=input.value.trim();if(!q)return;
  const btn=document.getElementById('scan-btn');
  const btnTxt=document.getElementById('scan-btn-text');
  const spin=document.getElementById('scan-spin');
  const queryText=q;
  if(btnTxt)btnTxt.textContent='';
  if(spin)spin.style.display='block';
  if(btn)btn.disabled=true;
  try{
    const r=await fetch('/.netlify/functions/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:150,
        messages:[{role:'user',content:`Estimate the macros for: "${queryText}". Reply ONLY with a JSON object, no markdown, no explanation, no preamble. Format exactly: {"name":"short display name","kcal":number,"p":number,"c":number,"fat":number} where p=protein grams, c=carb grams, fat=fat grams. All numbers must be integers.`}]
      })
    });
    const d=await r.json();
    if(!r.ok){
      const errMsg=d?.error?.message||'API error '+r.status;
      showScanError(errMsg);
    } else {
      const raw=(d.content&&d.content[0]&&d.content[0].text)||'{}';
      let parsed=null;
      try{
        const cleaned=raw.replace(/```json|```/g,'').trim();
        // extract first JSON object if there's surrounding text
        const match=cleaned.match(/\{[^{}]+\}/);
        parsed=match?JSON.parse(match[0]):JSON.parse(cleaned);
      }catch(e){parsed=null;}
      if(parsed&&parsed.p!==undefined){
        const s=ls();const fd=s.food[key]||[];
        fd.push({n:parsed.name||queryText,kcal:parsed.kcal||0,p:parsed.p||0,c:parsed.c||0,fat:parsed.fat||0});
        s.food[key]=fd;sv('food',s.food);
        render(); return;
      } else {
        showScanError('Could not parse response — try rephrasing');
      }
    }
  }catch(e){
    showScanError('Connection error — check your internet');
  }
  const b=document.getElementById('scan-btn');
  const bt=document.getElementById('scan-btn-text');
  const sp=document.getElementById('scan-spin');
  if(bt)bt.textContent='Scan';if(sp)sp.style.display='none';if(b)b.disabled=false;
}

function showScanError(msg){
  const b=document.getElementById('scan-btn');
  const bt=document.getElementById('scan-btn-text');
  const sp=document.getElementById('scan-spin');
  if(bt){bt.textContent='Retry';bt.style.color='#fff';}
  if(sp)sp.style.display='none';
  if(b)b.disabled=false;
  // Show error below the input
  const existing=document.getElementById('scan-error');

function exportData(){
  const data=ls();const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`giovannis-plan-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.workout)sv('workout',data.workout);
        if(data.meals)sv('meals',data.meals);
        if(data.food)sv('food',data.food);
        if(data.weight)sv('weight',data.weight);
        render();alert('Data restored successfully!');
      }catch(e){alert('Could not read file. Make sure it\'s a valid backup.');}
    };reader.readAsText(file);
  };input.click();
}

function openSwap(wk,di,mi){
  swapPending={wk,di,mi};const m=getMealWeek(wk)[di].items[mi];
  document.getElementById('swap-meal-name').textContent=`${m.time} · ${m.label} — ${m.name}`;
  document.getElementById('swap-input').value='';
  document.getElementById('swap-answer-wrap').style.display='none';
  document.getElementById('swap-btn-text').textContent='Get a suggestion';
  document.getElementById('swap-spinner').style.display='none';
  document.getElementById('swap-go').disabled=false;
  document.getElementById('swap-modal').classList.add('show');
}
async function submitSwap(){
  const msg=document.getElementById('swap-input').value.trim();if(!msg)return;
  const {wk,di,mi}=swapPending;const rawM=getMealWeek(wk)[di].items[mi];const m=scaleMealItem(rawM);
  document.getElementById('swap-btn-text').textContent='Thinking…';
  document.getElementById('swap-spinner').style.display='block';
  document.getElementById('swap-go').disabled=true;
  const applyBtn=document.getElementById('swap-apply-btn');if(applyBtn)applyBtn.style.display='none';
  try{
    const t=getAdjustedTargets();
    const r=await fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:`You help Giovanni (68 kg, 180 cm) on a ${t.gainLabel.toLowerCase()} plan (~${t.kcal} kcal/day, ~${t.protein}g protein target). He dislikes Greek yogurt, oats, soft cheese. Hard cheeses only (cheddar, Parmesan, Pecorino, Grana Padano). Current meal: ${m.label} at ${m.time} — "${m.name}": ${m.desc} (~${m.p}g protein). He says: "${msg}". Give a specific practical swap hitting ~${m.p}g protein. Reply ONLY with valid JSON, no markdown, no extra text: {"name":"short meal name","desc":"ingredients with quantities","p":protein_grams,"kcal":calories,"note":"1 sentence why this swap works"}`}]})});
    const d=await r.json();
    const raw=(d.content&&d.content[0]&&d.content[0].text)||'{}';
    let parsed=null;
    try{const cleaned=raw.replace(/```json|```/g,'').trim();const match=cleaned.match(/\{[\s\S]*\}/);parsed=match?JSON.parse(match[0]):JSON.parse(cleaned);}catch(e){parsed=null;}
    if(parsed&&parsed.name&&parsed.p!==undefined){
      document.getElementById('swap-answer-text').innerHTML=`<strong style="font-size:13px">${parsed.name}</strong><br><span style="color:var(--muted);font-size:12px;line-height:1.5;display:block;margin-top:3px">${parsed.desc}</span><span style="font-size:11px;color:var(--green);font-weight:700;margin-top:5px;display:block">${parsed.p}g protein · ${parsed.kcal||'~'+Math.round(m.p*4+100)} kcal</span>${parsed.note?`<span style="display:block;margin-top:6px;font-size:12px;color:var(--muted);font-style:italic">${parsed.note}</span>`:''}`;
      swapResults[`${wk}-${di}-${mi}`]={json:parsed};
      if(applyBtn){applyBtn.style.display='block';applyBtn.onclick=()=>applySwap(wk,di,mi);}
    }else{
      document.getElementById('swap-answer-text').textContent=raw||'Could not generate a suggestion.';
      swapResults[`${wk}-${di}-${mi}`]={text:raw};
      if(applyBtn)applyBtn.style.display='none';
    }
    document.getElementById('swap-answer-wrap').style.display='block';
  }catch(e){document.getElementById('swap-answer-text').textContent='Connection error. Please try again.';document.getElementById('swap-answer-wrap').style.display='block';}
  document.getElementById('swap-btn-text').textContent='Try another';
  document.getElementById('swap-spinner').style.display='none';
  document.getElementById('swap-go').disabled=false;
}
function applySwap(wk,di,mi){
  const key=`${wk}-${di}-${mi}`;
  const result=swapResults[key];
  if(!result||!result.json)return;
  const json=result.json;
  // Clone week from mealMatrix (or from embedded meals if not yet AI-generated)
  let week=mealMatrix[wk]?mealMatrix[wk]:JSON.parse(JSON.stringify(embeddedMeals[wk]||embeddedMeals[0]));
  const original=week[di].items[mi];
  week[di].items[mi]={...original,name:json.name,desc:json.desc,p:json.p};
  if(json.kcal&&original.kcal){const diff=json.kcal-(original.kcal||0);week[di].kcal=Math.round((week[di].kcal||0)+diff);}
  week[di].protein=week[di].items.reduce((s,it)=>s+(it.p||0),0);
  mealMatrix[wk]=week;
  localStorage.setItem(`gp_meals_w${wk+1}`,JSON.stringify(week));
  delete swapResults[key];
  document.getElementById('swap-modal').classList.remove('show');
  render();
}

let tlogExpanded={};
function buildTrainingLog(){
  const logs=JSON.parse(localStorage.getItem('gp_trainlog')||'{}');

function drawChart(){

  const W=cv.offsetWidth,H=160;cv.width=W*dpr;cv.height=H*dpr;cv.style.height=H+'px';

  if(wl.length<2){ctx.fillStyle='#B0A898';ctx.font='13px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText('Log at least 2 entries to see chart',W/2,H/2);return;}
  const ws=wl.map(e=>e.w);const mn=Math.min(...ws)-0.5,mx=Math.max(...ws)+0.5;
  const p={t:16,r:14,b:26,l:44};const cW=W-p.l-p.r,cH=H-p.t-p.b;

  const g=ctx.createLinearGradient(0,p.t,0,H-p.b);g.addColorStop(0,'rgba(74,124,89,0.15)');g.addColorStop(1,'rgba(74,124,89,0)');
  ctx.beginPath();ctx.moveTo(xS(0),yS(wl[0].w));wl.forEach((_,i)=>{if(i)ctx.lineTo(xS(i),yS(wl[i].w));});
  ctx.lineTo(xS(wl.length-1),H-p.b);ctx.lineTo(xS(0),H-p.b);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.moveTo(xS(0),yS(wl[0].w));wl.forEach((_,i)=>{if(i)ctx.lineTo(xS(i),yS(wl[i].w));});ctx.strokeStyle='#4A7C59';ctx.lineWidth=2;ctx.stroke();
  wl.forEach((e,i)=>{ctx.beginPath();ctx.arc(xS(i),yS(e.w),4,0,Math.PI*2);ctx.fillStyle='#4A7C59';ctx.fill();ctx.beginPath();ctx.arc(xS(i),yS(e.w),2,0,Math.PI*2);ctx.fillStyle='#F5F1EB';ctx.fill();const step=Math.max(1,Math.floor(wl.length/5));if(i%step===0||i===wl.length-1){const dt=new Date(e.d);ctx.fillStyle='#B0A898';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText(`${dt.getDate()}/${dt.getMonth()+1}`,xS(i),H-6);}});
}

// ── STREAK ───────────────────────────────────────────────────────────────────
function calcStreak(){
  let streak=0;const now=new Date();
  for(let i=0;i<30;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const di=d.getDay()===0?6:d.getDay()-1;
    if(TYPE[di]==='rest'){continue;}// rest days don't break streak
    const key=d.toDateString();const s=ls();const wd=s.workout[key]||{};
    let done=false;
    workouts[di].exercises.forEach((e,ei)=>{for(let si=0;si<e.sets;si++)if((wd[ei]||{})[si])done=true;});
    if(done)streak++;else if(i>0)break;// today not done yet is ok
  }
  return streak;
}

// ── WEEKLY REVIEW ─────────────────────────────────────────────────────────────
function calcWeeklyReview(){
  const s=ls();let workouts_done=0,totalP=0,days=0;
  const today=todayIdx();// 0=Mon … 6=Sun — only count Mon→today
  for(let i=0;i<=today;i++){
    const d=new Date();d.setDate(d.getDate()-(today-i));
    const key=d.toDateString();const wd=s.workout[key]||{};
    if(TYPE[i]!=='rest'){
      let done=false;
      workouts[i].exercises.forEach((e,ei)=>{for(let si=0;si<e.sets;si++)if((wd[ei]||{})[si])done=true;});
      if(done)workouts_done++;
    }
    const mkey=`w0-${key}`;const md=s.meals[mkey]||{};const fd=s.food[mkey]||[];
    const m=getMealWeek(0)[i];let lp=0;
    m.items.forEach((it,idx)=>{if(md[idx])lp+=it.p;});fd.forEach(f=>lp+=f.p);
    if(lp>0){totalP+=lp;days++;}
  }
  // workouts possible so far this week (excluding rest days up to today)
  const workoutDaysSoFar=Array.from({length:today+1},(_,i)=>i).filter(i=>TYPE[i]!=='rest').length;
  return{workouts:workouts_done,workoutDaysSoFar,avgProtein:days?Math.round(totalP/days):0};
}

// load AI weekly comment after render
function loadWeeklyReview(){
  const el=document.getElementById('review-ai-text');if(!el)return;
  const wr=calcWeeklyReview();const s=ls();const wl=s.weight;
  const wChange=wl.length>=2?((wl[wl.length-1].w-wl[Math.max(0,wl.length-8)].w).toFixed(1)):null;
  const dayName=DAYS[todayIdx()];
  const prompt=`Giovanni is on a lean bulk (68 kg starting, 180 cm, home PPL training). Today is ${dayName}, so the week has only just started or is partway through — do NOT judge the full week yet. So far this week: ${wr.workouts} out of ${wr.workoutDaysSoFar} possible workout days completed, average protein intake ${wr.avgProtein?wr.avgProtein+'g':'not yet logged'} (target 200g/day), weight trend this week: ${wChange!==null?wChange+'kg change':'not enough data'}. Write ONE short motivational coaching sentence (max 20 words) that is appropriate for where he is in the week — e.g. if it's Monday, focus on setting a strong start. Be specific and positive. No greeting.`;
  fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:60,messages:[{role:'user',content:prompt}]})})
    .then(r=>r.json()).then(d=>{const t=(d.content&&d.content[0]&&d.content[0].text)||'Stay consistent — every day counts.';if(el)el.innerHTML=`"${t}"`;})
    .catch(()=>{if(el)el.textContent='Stay consistent — every day counts.';});
}

// ── BODY COMP ─────────────────────────────────────────────────────────────────
function buildBodyComp(wl,weeklyWorkouts){
  if(wl.length<2)return`<div style="font-size:12px;color:var(--muted);line-height:1.6">Log at least 2 weight entries for a body composition estimate.</div>`;
  const totalGain=wl[wl.length-1].w-wl[0].w;
  const weeks=Math.max(1,Math.round((new Date(wl[wl.length-1].d)-new Date(wl[0].d))/(7*86400000)));
  // estimate: consistent training = ~60% muscle, 40% fat on a proper bulk
  // poor training = more fat. Using weekly workout frequency as proxy.
  const trainingScore=Math.min(1,weeklyWorkouts/4);
  const musclePct=Math.round((0.45+0.25*trainingScore)*100);
  const fatPct=100-musclePct;
  const ul2=unitLabel();
  const muscleKg=toDisplay(totalGain*musclePct/100).toFixed(2);
  const fatKg=toDisplay(totalGain*fatPct/100).toFixed(2);
  const gainColor=totalGain>=0?'var(--green)':'var(--danger)';
  const sign=totalGain>=0?'+':'';
  return`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
    <div style="font-size:12px;font-weight:600">Total weight change</div>
    <div style="font-family:'Sora',sans-serif;font-size:20px;font-weight:600;color:${gainColor}">${sign}${toDisplay(totalGain).toFixed(1)} ${ul2} over ${weeks}w</div>
  </div>
  <div class="comp-bar-row">
    <span class="comp-name">Muscle</span>
    <div class="comp-bar-outer"><div class="comp-bar-inner" style="width:${musclePct}%;background:var(--accent)"></div></div>
    <span class="comp-val" style="color:var(--accent)">${sign}${muscleKg}${ul2}</span>
  </div>
  <div class="comp-bar-row">
    <span class="comp-name">Fat</span>
    <div class="comp-bar-outer"><div class="comp-bar-inner" style="width:${fatPct}%;background:var(--warm)"></div></div>
    <span class="comp-val" style="color:var(--warm)">${sign}${fatKg}${ul2}</span>
  </div>
  <div style="font-size:11px;color:var(--muted2);margin-top:12px;line-height:1.5">Estimate based on weight trend + training consistency (${weeklyWorkouts} workouts this week). More consistent training shifts the ratio toward muscle.</div>`;
}

// ── BEFORE / AFTER ────────────────────────────────────────────────────────────
function updateBA(){
  const fromEl=document.getElementById('ba-from');const toEl=document.getElementById('ba-to');
  if(!fromEl||!toEl)return;
  const s=ls();const wl=s.weight;
  const fromI=parseInt(fromEl.value)||0;
  const toI=parseInt(toEl.value)||(wl.length-1);
  const from=wl[Math.min(fromI,wl.length-1)];const to=wl[Math.min(toI,wl.length-1)];
  if(!from||!to){return;}
  const delta=to.w-from.w;const sign=delta>=0?'+':'';
  const weeks=Math.max(1,Math.round((new Date(to.d)-new Date(from.d))/(7*86400000)));
  const col=delta>=0?'var(--green)':'var(--danger)';const ul=unitLabel();
  const el=document.getElementById('ba-result');if(!el)return;
  el.innerHTML=`<div class="ba-result">
    <div><div class="ba-val serif">${toDisplay(from.w)}</div><div class="ba-lbl">From (${ul})</div></div>
    <div class="ba-arrow">→</div>
    <div><div class="ba-val serif">${toDisplay(to.w)}</div><div class="ba-lbl">To (${ul})</div></div>
    <div style="width:1px;background:var(--border);align-self:stretch;margin:0 4px"></div>
    <div><div class="ba-val serif" style="color:${col}">${sign}${toDisplay(Math.abs(delta)).toFixed(1)}</div><div class="ba-lbl">${ul} in ${weeks}w</div></div>
  </div>`;
}

function requestNotifPermission(){
  if(typeof Notification==='undefined'){alert('Notifications are not supported on this browser. On iPhone, make sure you\'ve added the app to your Home Screen first.');return;}
  Notification.requestPermission().then(p=>{render();if(p==='granted')scheduleNotifs();});
}

function scheduleNotifs(){
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const ti=todayIdx();const m=getMealWeek(0)[ti];
  const now=new Date();
  m.items.forEach(meal=>{
    const[h,min]=meal.time.split(':').map(Number);
    const t=new Date(now);t.setHours(h,min,0,0);
    const ms=t-now;
    if(ms>0&&ms<86400000){
      setTimeout(()=>{
        try{new Notification('🥗 Meal time — Giovanni\'s Plan',{body:`${meal.label}: ${meal.name}`,icon:'/favicon.ico'});}catch(e){}
      },ms);
    }
  });
  if(TYPE[ti]!=='rest'){
    const t=new Date(now);t.setHours(7,0,0,0);const ms=t-now;
    if(ms>0){setTimeout(()=>{try{new Notification('💪 Training day — Giovanni\'s Plan',{body:`Today is ${TYPE[ti]} day. Let\'s go!`,icon:'/favicon.ico'});}catch(e){}},ms);}
  }
}

function saveHardConstraints(arr){localStorage.setItem('gp_hard_constraints',JSON.stringify(arr));}

async function planCallClaude(prompt,systemMsg){
  const bodyObj={model:'claude-3-5-haiku-20241022',max_tokens:1400,messages:[{role:'user',content:prompt}]};
  if(systemMsg)bodyObj.system=systemMsg;
  const r=await fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(bodyObj)});
  const data=await r.json();
  if(!r.ok||data.error)throw new Error(data.error?.message||'API error '+r.status);
  return data.content[0].text.trim();
}

const _SHAKE_AM={time:'10:30',label:'Morning shake',name:'Whey protein shake',desc:'Whey (1 scoop) + banana + whole milk (300ml)',p:35,kcal:320,shake:true};
const _SHAKE_PM={time:'21:30',label:'Evening shake',name:'Casein shake',desc:'Casein (1 scoop) + whole milk (300ml)',p:30,kcal:220,shake:true};

function dbIsAllowed(meal){
  const banned=extractBannedFoods(getHardConstraints());
  if(!banned.length)return true;
  const txt=(meal.name+' '+meal.desc).toLowerCase();
  return!banned.some(f=>new RegExp('\\b'+f.replace(/\s+/g,'\\s+')+'\\b','i').test(txt));
}

function generateWeekFromDB(prevWeek){
  const shuffle=arr=>[...arr].sort(()=>Math.random()-0.5);
  const prevNames=new Set(prevWeek?prevWeek.flatMap(d=>d.items.map(it=>it.name)):[]);
  // Prefer meals not used in prevWeek; fall back to full pool if not enough variety
  const pool=cat=>{const all=MEAL_DB[cat].filter(dbIsAllowed);const fresh=all.filter(m=>!prevNames.has(m.name));return shuffle(fresh.length>=7?fresh:all);};
  const bs=pool('breakfasts'),ls=pool('lunches'),ss=pool('snacks'),ds=pool('dinners');
  const TRAIN=[0,1,3,4,5];
  return Array.from({length:7},(_,d)=>{
    const b=bs[d%Math.max(bs.length,1)],l=ls[d%Math.max(ls.length,1)],s=ss[d%Math.max(ss.length,1)],dn=ds[d%Math.max(ds.length,1)];
    const isTr=TRAIN.includes(d);
    const items=[
      {time:'7:30',label:'Breakfast',name:b.name,desc:b.desc,p:b.p,kcal:b.kcal,shake:false},
      {..._SHAKE_AM},
      {time:'13:00',label:'Lunch',name:l.name,desc:l.desc,p:l.p,kcal:l.kcal,shake:false},
      {time:'16:00',label:isTr?'Pre-workout':'Snack',name:s.name,desc:s.desc,p:s.p,kcal:s.kcal,shake:false},
      {time:'19:30',label:'Dinner',name:dn.name,desc:dn.desc,p:dn.p,kcal:dn.kcal,shake:false},
      {..._SHAKE_PM},
    ];
    return{kcal:items.reduce((a,it)=>a+(it.kcal||0),0),protein:items.reduce((a,it)=>a+(it.p||0),0),items};
  });
}

function generatePartialFromDB(selectedLabels){
  const savedRaw=localStorage.getItem('gp_meals_w1');
  const week=savedRaw?JSON.parse(savedRaw):JSON.parse(JSON.stringify(mealMatrix[0]));
  const TRAIN=[0,1,3,4,5];
  const labelToPool={
    'Breakfast':MEAL_DB.breakfasts.filter(dbIsAllowed),
    'Lunch':MEAL_DB.lunches.filter(dbIsAllowed),
    'Dinner':MEAL_DB.dinners.filter(dbIsAllowed),
    'Pre-workout':MEAL_DB.snacks.filter(dbIsAllowed),
    'Snack':MEAL_DB.snacks.filter(dbIsAllowed),
  };
  for(const label of selectedLabels){
    const pool=labelToPool[label]||[];if(!pool.length)continue;
    for(let d=0;d<7;d++){
      const meal=pool[Math.floor(Math.random()*pool.length)];
      const idx=week[d].items.findIndex(it=>it.label===label||it.label.includes(label.split('/')[0].trim())||label.includes(it.label));
      if(idx<0)continue;
      const isTr=TRAIN.includes(d);
      week[d].items[idx]={time:week[d].items[idx].time,label:isTr&&(label==='Snack')?'Pre-workout':label,name:meal.name,desc:meal.desc,p:meal.p,kcal:meal.kcal,shake:false};
      week[d].protein=week[d].items.reduce((s,it)=>s+(it.p||0),0);
      week[d].kcal=week[d].items.reduce((s,it)=>s+(it.kcal||0),0);
    }
  }
  return week;
}

const FOOD_SUBS={
  'salmon':'chicken breast','tuna':'chicken breast','mackerel':'chicken breast',
  'turkey':'lean pork mince','turkey mince':'lean pork mince',
  'broccoli':'green beans','cabbage':'courgette',
  'oats':'whole grain bread','oat porridge':'scrambled eggs',
  'greek yogurt':'skyr','cottage cheese':'skyr',
  'ricotta':'grated Parmesan','mascarpone':'grated Parmesan',
  'brie':'aged cheddar','protein bar':'handful of almonds','protein bars':'handful of almonds',
};
function sanitisePlan(week){
  const banned=extractBannedFoods(getHardConstraints());
  if(!banned.length)return week;
  for(const day of week){
    for(const item of (day.items||[])){
      if(item.shake)continue;
      for(const food of banned){
        const re=new RegExp('\\b'+food.replace(/\s+/g,'\\s+')+'\\b','gi');
        if(re.test(item.name)||re.test(item.desc)){
          const sub=FOOD_SUBS[food.toLowerCase()]||'chicken breast';
          item.name=(item.name||'').replace(re,sub);
          item.desc=(item.desc||'').replace(re,sub);
        }
      }
    }
  }
  return week;
}

// Robustly extract individual banned food names from constraint strings.
// Handles: "no tuna or salmon, no broccoli, cabbage, turkey"
// → ["tuna","salmon","broccoli","cabbage","turkey"]
function extractBannedFoods(constraints){
  const banned=[];
  for(const c of constraints){
    if(!/\bno\b/i.test(c))continue;
    const lower=c.toLowerCase();
    // Split at ", no" to separate distinct "no X" clauses
    const clauses=lower.split(/,\s*(?=no\s)/);
    for(const clause of clauses){
      if(!/\bno\b/.test(clause))continue;
      // Strip the leading "no"
      const afterNo=clause.replace(/.*\bno\s+/i,'').trim();
      // Split remaining by comma or " or "/" and "
      afterNo.split(/\s*,\s*|\s+or\s+|\s+and\s+/)
        .map(s=>s.replace(/[—\-\(].*/g,'').replace(/[.;:!?]+$/g,'').trim())
        .filter(s=>s.length>2)
        .forEach(s=>banned.push(s));
    }
  }
  return[...new Set(banned)];
}

function buildDayPrompt(d,isTr,tKcal,tProtein,tCarbs,usedCarbs,usedDinners,omega3,iron,excl,extraExcl,retryErr){
  const dname=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][d];
  const o3Need=omega3<3&&(7-d)<=(3-omega3),feNeed=iron<3&&(7-d)<=(3-iron);
  const constraints=getHardConstraints();
  const hardRules=constraints.map(c=>`• ${c}`).join('\n');
  const bannedFromConstraints=extractBannedFoods(constraints);
  const allExcl=[...bannedFromConstraints,...excl,...(extraExcl?[extraExcl]:[])].filter(Boolean);
  const exclStr=[...new Set(allExcl)].join(', ');
  // Don't suggest omega-3 fish that the user has banned
  const o3Fish=['salmon','tuna','mackerel','sardines'];
  const o3AllBanned=o3Fish.filter(f=>bannedFromConstraints.some(b=>b.includes(f)));
  const o3Available=o3Fish.filter(f=>!o3AllBanned.some(b=>b.includes(f)));
  const o3Str=o3Available.join('/');
  const o3Line=o3Available.length===0?'':o3Need?`• MUST include ${o3Str} (omega-3 critical today)`:omega3<3?`• Prefer omega-3 source (${o3Str})`:'';
  // Build leafy greens suggestion excluding banned veg
  const bannedGreens=['broccoli','kale','spinach','cabbage','cauliflower'].filter(g=>bannedFromConstraints.some(b=>b.includes(g)));
  const availableGreens=['spinach','kale','broccoli','chard','courgette','green beans'].filter(g=>!bannedGreens.includes(g));
  const greensLine=availableGreens.length>0?`• Include leafy greens/veg (${availableGreens.slice(0,3).join(', ')}, etc.)`:'• Include non-leafy vegetables';
  return`You are a sports nutritionist. Generate ONE day's meal plan. Return ONLY valid JSON — no markdown, no explanation.

DAY ${d+1}/7: ${dname} (${isTr?'TRAINING DAY':'REST DAY'})
TARGETS: ${tKcal} kcal | ${tProtein}g protein | ${tCarbs}g carbs

⛔ HARD RULES — THESE ARE ABSOLUTE. ANY VIOLATION MAKES THE RESPONSE INVALID:
${hardRules}
${exclStr?`⛔ NEVER USE ANY OF THESE IN ANY MEAL: ${exclStr}`:''}

FIXED SHAKES — copy exactly:
10:30 → {"time":"10:30","label":"Morning shake","name":"Whey protein shake","desc":"Whey (1 scoop) + [one fruit] + whole milk (300 ml)","p":35,"shake":true}
21:30 → {"time":"21:30","label":"Evening shake","name":"Casein shake","desc":"Casein (1 scoop) + whole milk (300 ml)","p":30,"shake":true}

NUTRITION RULES:
• Each main meal (breakfast/lunch/dinner) ≥30g protein
${greensLine}
${isTr?'• Training day: 16:00 pre-workout snack must include fast carbs (+100 kcal)':'• Rest day: carbs −15%, same protein'}
${o3Line}
${feNeed?'• MUST include red meat or lentils (iron critical today)':iron<3?'• Prefer red meat or lentils today':''}
${usedCarbs.length?`• Carbs used so far: ${usedCarbs.join(', ')} — USE A DIFFERENT carb source today`:''}
${usedDinners.length?`• Dinner must be completely different from: ${usedDinners.join(' | ')}`:''}

Required JSON:
{"kcal":${tKcal},"protein":${tProtein},"carbs":${tCarbs},"fat":70,"items":[
{"time":"7:30","label":"Breakfast","name":"...","desc":"ingredient (Xg) + ingredient (Xml)","p":34,"shake":false},
{"time":"10:30","label":"Morning shake","name":"Whey protein shake","desc":"Whey (1 scoop) + banana + whole milk (300 ml)","p":35,"shake":true},
{"time":"13:00","label":"Lunch","name":"...","desc":"...","p":42,"shake":false},
{"time":"16:00","label":"${isTr?'Pre-workout':'Snack'}","name":"...","desc":"...","p":20,"shake":false},
{"time":"19:30","label":"Dinner","name":"...","desc":"...","p":40,"shake":false},
{"time":"21:30","label":"Evening shake","name":"Casein shake","desc":"Casein (1 scoop) + whole milk (300 ml)","p":30,"shake":true}
]}`;
}

function buildSingleMealPrompt(mealLabel,dayIdx,isTr,tKcal,tProtein,excl,extraExcl,otherMeals,retryErr){
  const dname=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][dayIdx];
  const constraints=getHardConstraints();
  const hardRules=constraints.map(c=>`• ${c}`).join('\n');
  const bannedFromConstraints=extractBannedFoods(constraints);
  const allExcl=[...bannedFromConstraints,...excl,...(extraExcl?[extraExcl]:[])].filter(Boolean);
  const exclStr=[...new Set(allExcl)].join(', ');
  const timeMap={Breakfast:'7:30',Lunch:'13:00',Dinner:'19:30'};
  const time=timeMap[mealLabel]||'16:00';
  const minP=(['Breakfast','Lunch','Dinner'].includes(mealLabel))?30:15;
  const ctx=otherMeals.filter(m=>!m.shake&&m.label!==mealLabel).map(m=>`${m.label}: ${m.name}`).join(', ');
  return`Generate ONE single meal. Return ONLY a JSON object (not an array).

MEAL: ${mealLabel} on ${dname} (${isTr?'Training':'Rest'} day)
TARGET: ~${tKcal} kcal, ≥${minP}g protein (aim for ~${tProtein}g)
OTHER MEALS TODAY (for context): ${ctx||'none'}

⛔ HARD RULES — ABSOLUTE, NO EXCEPTIONS:
${hardRules}
${exclStr?`⛔ NEVER USE ANY OF THESE: ${exclStr}`:''}
${retryErr?`⚠ PREVIOUS ATTEMPT FAILED: "${retryErr}" — fix this.`:''}

Return JSON:
{"time":"${time}","label":"${mealLabel}","name":"...","desc":"ingredient (Xg) + ingredient (Xml)","p":${tProtein},"shake":false}`;
}

function validatePlanDay(data,excl){
  if(!data||!Array.isArray(data.items)||data.items.length<6)return'Missing items array';
  const allText=data.items.map(it=>((it.name||'')+' '+(it.desc||'')).toLowerCase()).join(' ');
  // Validate against current hard constraints (word-boundary matching)
  for(const food of extractBannedFoods(getHardConstraints())){
    const re=new RegExp('\\b'+food.replace(/\s+/g,'\\s+')+'\\b','i');
    if(re.test(allText))return`Hard constraint violated: contains "${food}"`;
  }
  for(const ex of excl){if(ex&&allText.includes(ex.toLowerCase()))return`Contains excluded: ${ex}`;}
  return null;
}

function extractPlanIngredients(week){
  const proteins=new Set(),carbs=new Set(),vegs=new Set();
  week.forEach(day=>day.items.forEach(it=>{
    if(it.shake)return;
    const d=(it.desc||'').toLowerCase();
    ['chicken breast','chicken thigh','beef mince','lean beef','beef strips','pork','salmon','tuna','cod','sea bass','turkey','lamb','steak','pork loin','pork tenderloin','smoked salmon'].forEach(p=>{if(d.includes(p))proteins.add(p);});
    ['white rice','basmati rice','brown rice','pasta','whole grain pasta','potato','sweet potato','quinoa','couscous','lentils','cannellini beans','chickpeas','kidney beans'].forEach(c=>{if(d.includes(c))carbs.add(c);});
    ['broccoli','spinach','kale','courgette','peppers','carrots','asparagus','green beans','peas','cherry tomatoes','mushroom','cucumber','avocado'].forEach(v=>{if(d.includes(v))vegs.add(v);});
  }));
  return{proteins:[...proteins],carbs:[...carbs],vegetables:[...vegs]};
}

function computePlanDiff(oldW,newW){
  const pick=(w,label,idx)=>w[idx]?.items.find(it=>it.label===label)?.name||'';
  return{
    dinners:newW.filter((_,i)=>pick(newW,'Dinner',i)!==pick(oldW,'Dinner',i)).length,
    lunches:newW.filter((_,i)=>pick(newW,'Lunch',i)!==pick(oldW,'Lunch',i)).length,
    breakfasts:newW.filter((_,i)=>(newW[i]?.items[0]?.name||'')!==(oldW[i]?.items[0]?.name||'')).length
  };
}

async function generatePlanWeek(weekNum,totalWeeks,tKcal,tProtein,excl,extraExcl,progressOffset){
  const TRAIN=[0,1,3,4,5];
  const dnames=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const week=[];
  let usedCarbs=[],usedDinners=[],omega3=0,iron=0,fallbackDays=0;
  const totalSteps=totalWeeks*7;
  // System message gets highest priority — model follows these much more reliably
  const bannedStr=extractBannedFoods(getHardConstraints()).join(', ');
  const systemMsg=bannedStr?`You are a sports nutritionist generating meal plans in JSON. STRICT REQUIREMENT — never include these ingredients in any meal: ${bannedStr}. No exceptions.`:null;
  for(let d=0;d<7;d++){
    const isTr=TRAIN.includes(d);
    const tKcalDay=isTr?tKcal+100:Math.round(tKcal*0.97);
    const tCarbs=isTr?Math.round(tKcalDay*0.42/4):Math.round(tKcalDay*0.36/4);
    let dayData=null;
    updateGenProgress(progressOffset+d+1,totalSteps,`Week ${weekNum} · ${dnames[d]}`,`Day ${progressOffset+d+1} of ${totalSteps}…`);
    try{
      const raw=await planCallClaude(buildDayPrompt(d,isTr,tKcalDay,tProtein,tCarbs,usedCarbs,usedDinners,omega3,iron,excl,extraExcl,null),systemMsg);
      const match=raw.match(/\{[\s\S]*\}/);
      if(match){
        const parsed=JSON.parse(match[0]);
        if(parsed&&Array.isArray(parsed.items)&&parsed.items.length>=6)dayData=parsed;
      }
    }catch(e){console.warn(`Day ${d+1} error:`,e.message);}
    if(!dayData){
      dayData=JSON.parse(JSON.stringify(embeddedMeals[Math.min(weekNum-1,1)][d]));
      fallbackDays++;
    }
    const allDesc=dayData.items.map(it=>(it.desc||'').toLowerCase()).join(' ');
    ['white rice','basmati rice','brown rice','pasta','potato','sweet potato','quinoa','couscous','lentils'].forEach(c=>{if(allDesc.includes(c)&&!usedCarbs.includes(c))usedCarbs.push(c);});
    const din=dayData.items.find(it=>it.label==='Dinner');if(din)usedDinners.push(din.name);
    if(/salmon|sardine|mackerel/.test(allDesc))omega3++;
    if(/beef|lamb|lentil/.test(allDesc))iron++;
    week.push(dayData);
  }
  week._fallbackDays=fallbackDays;
  return week;
}

async function partialRegenerate(selectedLabels,tKcal,tProtein,excl,extraExcl){
  const TRAIN=[0,1,3,4,5];
  const dnames=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const savedRaw=localStorage.getItem('gp_meals_w1');
  // Deep-copy the current week so we only mutate a local copy
  const week=savedRaw?JSON.parse(savedRaw):mealMatrix[0].map(d=>({...d,items:[...d.items]}));
  const totalSteps=7*selectedLabels.length;
  let step=0;
  for(const mealLabel of selectedLabels){
    for(let d=0;d<7;d++){
      step++;
      const isTr=TRAIN.includes(d);
      updateGenProgress(step,totalSteps,`${mealLabel} · ${dnames[d]}`,`Step ${step} of ${totalSteps}…`);
      const isBig=['Breakfast','Lunch','Dinner'].includes(mealLabel);
      const tMealKcal=isBig?Math.round(tKcal*0.28):Math.round(tKcal*0.13);
      const tMealP=isBig?35:20;
      const otherMeals=week[d].items;
      let newItem=null,lastErr=null;
      for(let attempt=0;attempt<2&&!newItem;attempt++){
        try{
          const raw=await planCallClaude(buildSingleMealPrompt(mealLabel,d,isTr,tMealKcal,tMealP,excl,extraExcl,otherMeals,attempt>0?lastErr:null));
          // Single-object match (no nested arrays)
          const match=raw.match(/\{[^{}]*\}/);
          if(!match)throw new Error('No JSON');
          const parsed=JSON.parse(match[0]);
          if(!parsed.name||parsed.p===undefined)throw new Error('Invalid meal object');
          newItem=parsed;
        }catch(e){lastErr=e.message;}
      }
      if(newItem){
        // Match by label (handle "Pre-workout / Snack" vs stored label)
        const idx=week[d].items.findIndex(it=>it.label===mealLabel||mealLabel.includes(it.label)||it.label.includes(mealLabel.split('/')[0].trim()));
        if(idx>=0)week[d].items[idx]=newItem;
        // Recalculate day protein total
        week[d].protein=week[d].items.reduce((s,it)=>s+(it.p||0),0);
      }
    }
  }
  const prevRaw=localStorage.getItem('gp_meals_w1');
  const diff=prevRaw?computePlanDiff(JSON.parse(prevRaw),week):null;
  localStorage.setItem('gp_meals_w1',JSON.stringify(week));
  mealMatrix[0]=week;
  localStorage.setItem('gp_meal_exclusions_last',JSON.stringify(extractPlanIngredients(week)));
  localStorage.setItem('gp_planner_meta',JSON.stringify({ts:Date.now(),diff}));
}

function startPlanGeneration(mode){
  if(planGenerating)return;
  mode=mode||'full';
  planGenerating=true;
  const prevRaw=localStorage.getItem('gp_meals_w1');
  if(mode==='partial'){
    const selectedLabels=[...document.querySelectorAll('[id^="regen-"]:checked')].map(cb=>cb.value);
    if(!selectedLabels.length){planGenerating=false;alert('Select at least one meal type.');return;}
    const week=generatePartialFromDB(selectedLabels);
    const diff=prevRaw?computePlanDiff(JSON.parse(prevRaw),week):null;
    localStorage.setItem('gp_meals_w1',JSON.stringify(week));
    mealMatrix[0]=week;
    localStorage.setItem('gp_planner_meta',JSON.stringify({ts:Date.now(),diff}));
  }else{
    const week1=generateWeekFromDB(null);
    const week2=generateWeekFromDB(week1);
    const diff=prevRaw?computePlanDiff(JSON.parse(prevRaw),week1):null;
    localStorage.setItem('gp_meals_w1',JSON.stringify(week1));
    localStorage.setItem('gp_meals_w2',JSON.stringify(week2));
    mealMatrix=[week1,week2];
    localStorage.setItem('gp_meal_exclusions_last',JSON.stringify(extractPlanIngredients(week1)));
    localStorage.setItem('gp_planner_meta',JSON.stringify({ts:Date.now(),diff}));
  }
  planGenerating=false;
  closePlannerSheet();
  go('plan');
}

(function(){
  updateHeader('today');
  render();
  loadMealMatrix();
  if(typeof Notification!=='undefined'&&Notification.permission==='granted')scheduleNotifs();
})();
